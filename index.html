<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YESSS UK — End of Month Checklist</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #e8edf5;
    --bg2: #cdd5e2;
    --bg3: #bcc6d6;
    --border: rgba(0,0,0,0.1);
    --text: #1a2535;
    --muted: #4a5a72;
    --done-bg: rgba(0,0,0,0.04);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse at 20% 50%, rgba(40,65,110,0.1) 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 20%, rgba(30,50,90,0.08) 0%, transparent 50%);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    font-size: 14px;
    min-height: 100vh;
    padding-bottom: 60px;
  }

  /* ── HEADER ── */
  .header {
    position: sticky; top: 0; z-index: 100;
    background: rgba(232,237,245,0.97);
    backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .header-title { font-family:'Syne',sans-serif; font-weight:800; font-size:18px; letter-spacing:-0.3px; white-space:nowrap; }
  .header-title span { color: #38bdf8; }
  .global-bar-wrap { flex:1; min-width:180px; display:flex; align-items:center; gap:10px; }
  .global-bar-bg { flex:1; height:6px; background:rgba(0,0,0,0.1); border-radius:99px; overflow:hidden; }
  .global-bar-fill { height:100%; background:linear-gradient(90deg,#38bdf8,#34d399); border-radius:99px; transition:width .5s cubic-bezier(.4,0,.2,1); }
  .global-pct { font-family:'Syne',sans-serif; font-size:13px; font-weight:700; color:#1a2535; min-width:36px; text-align:right; }
  .header-actions { display:flex; gap:8px; align-items:center; flex-wrap:wrap; }

  /* ── SYNC BAR ── */
  .sync-bar {
    padding: 8px 24px; display:flex; align-items:center; gap:10px;
    font-size:12px; color:#1a2535; background:var(--bg); border-bottom:1px solid var(--border);
  }
  .sync-dot { width:7px; height:7px; border-radius:50%; background:var(--muted); transition:background .3s; }
  .sync-dot.ok { background:#34d399; }
  .sync-dot.err { background:#f87171; }
  .sync-dot.spin { background:#fbbf24; animation: pulse 1s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  /* ── CONTROLS ── */
  .controls { padding:16px 24px 4px; display:flex; gap:10px; align-items:center; flex-wrap:wrap; }
  .controls label { font-size:11px; text-transform:uppercase; letter-spacing:1px; color:#1a2535; margin-right:2px; }
  .chip {
    display:inline-flex; align-items:center; gap:4px; padding:4px 11px; border-radius:99px;
    font-size:12px; font-weight:500; cursor:pointer; border:1px solid rgba(0,0,0,0.15);
    background:rgba(255,255,255,0.3); color:#1a2535; transition:all .15s; user-select:none;
  }
  .chip:hover { border-color:rgba(0,0,0,0.3); }
  .chip.active { background:rgba(96,200,245,0.15); border-color:rgba(96,200,245,0.4); color:#60c8f5; }
  .btn {
    padding:5px 12px; border-radius:8px; border:1px solid rgba(0,0,0,0.15);
    background:rgba(255,255,255,0.3); color:#1a2535; font-family:'DM Sans',sans-serif;
    font-size:12px; cursor:pointer; transition:all .15s;
  }
  .btn:hover { border-color:rgba(0,0,0,0.3); }
  .btn.danger:hover { color:#f87171; border-color:rgba(248,113,113,0.4); }
  .btn.primary { background:rgba(56,189,248,0.12); border-color:rgba(56,189,248,0.3); color:#38bdf8; }
  .btn.primary:hover { background:rgba(56,189,248,0.2); }

  /* ── SEARCH ── */
  .search-wrap { position:relative; flex:1; min-width:180px; max-width:280px; }
  .search-input {
    width:100%; background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    padding:6px 10px 6px 30px; color:var(--text); font-family:'DM Sans',sans-serif; font-size:13px;
  }
  .search-input:focus { outline:1px solid rgba(56,189,248,0.4); }
  .search-input::placeholder { color:var(--muted); }
  .search-icon { position:absolute; left:9px; top:50%; transform:translateY(-50%); font-size:13px; color:#1a2740; pointer-events:none; }

  /* ── MONTH SELECT ── */
  .month-badge {
    font-family:'Syne',sans-serif; font-size:12px; color:#1a2535; padding:4px 10px;
    border:1px solid rgba(0,0,0,0.15); border-radius:8px; background:rgba(255,255,255,0.1); cursor:pointer;
  }

  /* ── CONTENT ── */
  .content { padding:20px 24px; max-width:1200px; }

  /* ── SECTION ── */
  .section {
    margin-bottom:24px; border-radius:14px; border:1px solid var(--border);
    background:var(--bg2); overflow:hidden; transition:opacity .2s;
    box-shadow:0 4px 24px rgba(0,0,0,0.3);
  }
  .section.hidden { display:none; }
  .section-header {
    display:flex; align-items:center; gap:12px; padding:14px 18px;
    border-bottom:1px solid var(--border); cursor:pointer; user-select:none;
  }
  .section-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .section-title { font-family:'Syne',sans-serif; font-weight:700; font-size:13px; letter-spacing:.5px; text-transform:uppercase; }
  .section-bar-wrap { flex:1; height:4px; background:rgba(0,0,0,0.1); border-radius:99px; overflow:hidden; }
  .section-bar-fill { height:100%; border-radius:99px; transition:width .4s cubic-bezier(.4,0,.2,1); }
  .section-pct { font-family:'Syne',sans-serif; font-size:12px; font-weight:700; min-width:34px; text-align:right; opacity:.85; }
  .section-count { font-size:11px; color:#1a2740; white-space:nowrap; }
  .section-chevron { font-size:12px; color:#1a2740; transition:transform .2s; }
  .section.collapsed .section-chevron { transform:rotate(-90deg); }
  .section.collapsed .section-body { display:none; }
  .section-done-badge { font-size:10px; padding:2px 8px; border-radius:99px; background:rgba(52,211,153,0.15); color:#34d399; font-weight:600; letter-spacing:.5px; }

  /* ── TASK ITEM ── */
  .task-item {
    display:flex; align-items:flex-start; gap:12px; padding:10px 18px;
    border-bottom:1px solid rgba(0,0,0,0.06); transition:background .15s;
    position:relative;
  }
  .task-item:last-child { border-bottom:none; }
  .task-item:hover { background:rgba(0,0,0,0.04); }
  .task-item.done { background:var(--done-bg); }
  .task-item.filtered-out { display:none; }

  /* Checkbox */
  .checkbox {
    width:18px; height:18px; border-radius:5px; border:2px solid rgba(26,37,53,0.4);
    flex-shrink:0; margin-top:1px; display:flex; align-items:center; justify-content:center;
    transition:all .2s; cursor:pointer; flex-shrink:0;
  }
  .checkbox::after { content:'✓'; font-size:11px; font-weight:700; color:#fff; opacity:0; transform:scale(.5); transition:all .2s; }
  .task-item.done .checkbox { border-color:transparent; background:#34d399; }
  .task-item.done .checkbox::after { opacity:1; transform:scale(1); }

  .task-text {
    flex:1; line-height:1.45; color:#1a2535; transition:all .2s; font-size:13px; cursor:pointer;
  }
  .task-item.done .task-text { color:#8fa0b8; text-decoration:line-through; text-decoration-color:#8fa0b8; text-decoration-thickness:1.5px; }

  .task-people { display:flex; gap:4px; flex-wrap:wrap; flex-shrink:0; }
  .person-tag {
    font-size:10px; font-weight:500; padding:2px 7px; border-radius:99px;
    background:rgba(0,0,0,0.1); color:#2d3e56; white-space:nowrap; transition:all .15s;
    cursor:pointer; user-select:none;
  }
  .person-tag:hover { background:rgba(0,0,0,0.18); transform:scale(1.05); }
  .person-tag.highlight { background:rgba(96,200,245,0.3); color:#7dd3fc; }
  /* Badge removed = barré */
  .person-tag.removed {
    background:rgba(248,113,113,0.12); color:#f87171;
    text-decoration:line-through; opacity:0.5;
  }

  /* ── DELETE BUTTON (visible on hover) ── */
  .task-delete {
    width:22px; height:22px; border-radius:5px; border:1px solid rgba(248,113,113,0.4);
    background:rgba(248,113,113,0.12); cursor:pointer; font-size:12px; font-weight:700; color:#f87171;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:all .15s; padding:0; line-height:1;
  }
  .task-delete:hover { background:rgba(248,113,113,0.3); border-color:rgba(248,113,113,0.7); transform:scale(1.1); }

  /* ── ADD TASK ROW ── */
  .add-task-row {
    padding: 8px 18px;
    border-top: 1px dashed rgba(0,0,0,0.1);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .add-task-btn {
    display: inline-flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); cursor: pointer;
    padding: 4px 8px; border-radius: 6px; border: none;
    background: transparent; font-family: 'DM Sans', sans-serif;
    transition: color .15s, background .15s;
    user-select: none;
  }
  .add-task-btn:hover { color: var(--text); background: rgba(0,0,0,0.05); }

  /* ── ADD TASK FORM (inline, expansible) ── */
  .add-task-form {
    display: none;
    flex-direction: column;
    gap: 8px;
    padding: 12px 18px 14px;
    border-top: 1px solid rgba(0,0,0,0.08);
    background: rgba(255,255,255,0.2);
    animation: slideDown .15s ease;
  }
  .add-task-form.open { display: flex; }
  @keyframes slideDown { from { opacity:0; transform:translateY(-6px); } to { opacity:1; transform:translateY(0); } }

  .add-task-input {
    width: 100%; padding: 8px 12px;
    background: var(--bg); border: 1px solid var(--border);
    border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 13px;
    color: var(--text);
  }
  .add-task-input:focus { outline: 1px solid rgba(56,189,248,0.4); }
  .add-task-input::placeholder { color: var(--muted); }

  .add-task-people {
    display: flex; gap: 6px; flex-wrap: wrap; align-items: center;
  }
  .add-task-people label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }
  .people-chip {
    font-size: 11px; padding: 3px 9px; border-radius: 99px; cursor: pointer;
    border: 1px solid rgba(0,0,0,0.15); background: rgba(255,255,255,0.3);
    color: #2d3e56; transition: all .15s; user-select: none;
  }
  .people-chip.selected { background: rgba(56,189,248,0.2); border-color: rgba(56,189,248,0.4); color: #38bdf8; }

  .add-task-actions { display:flex; gap:8px; }
  .btn-save { padding:5px 14px; border-radius:8px; border:none; background:#38bdf8; color:#fff; font-family:'DM Sans',sans-serif; font-size:12px; font-weight:500; cursor:pointer; transition:opacity .15s; }
  .btn-save:hover { opacity:.85; }
  .btn-cancel { padding:5px 14px; border-radius:8px; border:1px solid rgba(0,0,0,0.15); background:transparent; color:var(--muted); font-family:'DM Sans',sans-serif; font-size:12px; cursor:pointer; transition:all .15s; }
  .btn-cancel:hover { color:var(--text); }

  /* ── CONFETTI ── */
  .confetti-wrap { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:999; }
  .confetti-piece { position:absolute; width:8px; height:8px; border-radius:2px; animation:fall 2s ease-in forwards; }
  @keyframes fall { 0%{transform:translateY(-20px) rotate(0deg);opacity:1} 100%{transform:translateY(100vh) rotate(720deg);opacity:0} }

  /* ── RESPONSIVE ── */
  @media(max-width:600px){
    .controls{padding:12px 14px 4px;} .content{padding:14px;} .header{padding:12px 14px;gap:12px;} .task-text{font-size:12px;}
  }

  /* ── EDIT BUTTON ── */
  .task-edit {
    width:22px; height:22px; border-radius:5px; border:1px solid rgba(56,189,248,0.3);
    background:rgba(56,189,248,0.08); cursor:pointer; font-size:11px; color:#38bdf8;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
    transition:all .15s; padding:0; line-height:1;
  }
  .task-edit:hover { background:rgba(56,189,248,0.2); border-color:rgba(56,189,248,0.6); transform:scale(1.1); }

  /* ── EDIT FORM INLINE ── */
  .task-edit-form {
    display:flex; flex-direction:column; gap:8px;
    padding:10px 18px 12px; border-top:1px solid rgba(0,0,0,0.08);
    background:rgba(255,255,255,0.25); animation:slideDown .15s ease;
  }
  .task-edit-form input {
    width:100%; padding:7px 10px; background:var(--bg);
    border:1px solid rgba(56,189,248,0.3); border-radius:8px;
    font-family:'DM Sans',sans-serif; font-size:13px; color:var(--text);
  }
  .task-edit-form input:focus { outline:1px solid rgba(56,189,248,0.5); }
  .task-edit-people { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
  .task-edit-people label { font-size:11px; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; }

  /* ── VUE PERSONNE ── */
  #personView { display:none; padding:20px 24px; max-width:1200px; }
  #personView.active { display:block; }
  #mainContent.hidden { display:none; }

  .pv-header {
    display:flex; align-items:center; gap:12px; margin-bottom:20px;
  }
  .pv-avatar {
    width:40px; height:40px; border-radius:50%; display:flex; align-items:center;
    justify-content:center; font-family:'Syne',sans-serif; font-weight:700; font-size:16px;
    color:#fff; flex-shrink:0;
  }
  .pv-name { font-family:'Syne',sans-serif; font-weight:700; font-size:20px; }
  .pv-stats { font-size:12px; color:var(--muted); }
  .pv-progress { flex:1; }
  .pv-bar-bg { height:6px; background:rgba(0,0,0,0.1); border-radius:99px; overflow:hidden; margin-top:4px; }
  .pv-bar-fill { height:100%; border-radius:99px; transition:width .4s; }

  .pv-section-title {
    font-family:'Syne',sans-serif; font-size:11px; font-weight:700; letter-spacing:.1em;
    text-transform:uppercase; color:var(--muted); margin:20px 0 8px;
    display:flex; align-items:center; gap:8px;
  }
  .pv-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .pv-section-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

  .pv-task {
    display:flex; align-items:center; gap:10px; padding:9px 14px;
    background:var(--bg2); border:1px solid var(--border); border-radius:8px;
    margin-bottom:5px; transition:background .15s;
  }
  .pv-task:hover { background:var(--bg3); }

  /* Checkbox assignation */
  .pv-checkbox {
    width:18px; height:18px; border-radius:5px; flex-shrink:0;
    border:2px solid rgba(26,37,53,0.35); display:flex; align-items:center;
    justify-content:center; cursor:pointer; transition:all .2s;
  }
  .pv-checkbox::after { content:'✓'; font-size:11px; font-weight:700; color:#fff; opacity:0; transform:scale(.5); transition:all .2s; }
  .pv-task.assigned .pv-checkbox { background:#38bdf8; border-color:transparent; }
  .pv-task.assigned .pv-checkbox::after { opacity:1; transform:scale(1); }

  .pv-task-text { flex:1; font-size:13px; line-height:1.4; }
  .pv-task.assigned .pv-task-text { color:var(--text); }
  .pv-task:not(.assigned) .pv-task-text { color:var(--muted); }

  /* Badge "fait" */
  .pv-done-badge {
    font-size:10px; padding:2px 7px; border-radius:99px;
    background:rgba(52,211,153,0.15); color:#34d399; font-weight:600; flex-shrink:0;
  }
</style>
</head>
<body>

<div class="confetti-wrap" id="confettiWrap"></div>

<!-- HEADER -->
<div class="header">
  <div class="header-title">YESSS <span>UK</span> — End of Month</div>
  <div class="global-bar-wrap">
    <div class="global-bar-bg">
      <div class="global-bar-fill" id="globalBarFill" style="width:0%"></div>
    </div>
    <div class="global-pct" id="globalPct">0%</div>
  </div>
  <div class="header-actions">
    <select id="monthSelect" class="month-badge" onchange="changeMonth()" style="cursor:pointer"></select>
    <button class="btn primary" onclick="syncNow()">⟳ Sync</button>
    <button class="btn danger" onclick="resetMonth()">↺ Reset</button>
  </div>
</div>

<!-- SYNC BAR -->
<div class="sync-bar">
  <div class="sync-dot" id="syncDot"></div>
  <span id="syncStatus">Connexion au serveur partagé...</span>
</div>

<!-- CONTROLS -->
<div class="controls">
  <label>Personne :</label>
  <div class="chip active" data-person="ALL"      onclick="filterPerson(this)">Tous</div>
  <div class="chip"        data-person="PIERRE"   onclick="filterPerson(this)">Pierre</div>
  <div class="chip"        data-person="CEDRIC"   onclick="filterPerson(this)">Cédric</div>
  <div class="chip"        data-person="LIAM"     onclick="filterPerson(this)">Liam</div>
  <div class="chip"        data-person="LOURDES"  onclick="filterPerson(this)">Lourdes</div>
  <div class="chip"        data-person="MAHER"    onclick="filterPerson(this)">Maher</div>
  <div class="chip"        data-person="ABDUL"    onclick="filterPerson(this)">Abdul</div>
  <div class="chip"        data-person="EQUIPE"   onclick="filterPerson(this)">Équipes</div>
  &nbsp;
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" id="searchInput" placeholder="Rechercher une tâche..." oninput="applySearch()" />
  </div>
  <div class="chip" id="showDoneChip" onclick="toggleShowDone()" style="margin-left:auto">☑ Masquer faites</div>
</div>

<!-- MAIN CONTENT -->
<div class="content" id="mainContent"></div>
<!-- VUE PAR PERSONNE -->
<div id="personView"></div>

<script>
// ══════════════════════════════════════════════════════
// PERSONNES DISPONIBLES (pour le formulaire d'ajout)
// ══════════════════════════════════════════════════════
const ALL_PEOPLE = ['PIERRE','CEDRIC','LIAM','LOURDES','MAHER','ABDUL','EQUIPE'];

// ══════════════════════════════════════════════════════
// DONNÉES PAR DÉFAUT (utilisées uniquement si JSONbin est vide)
// ══════════════════════════════════════════════════════
const DEFAULT_SECTIONS = [
  {
    id:'start', label:'Start', color:'#34d399',
    tasks:[
      {id:'s1', text:"Vérifier l'initialisation des STATISTIQUES (+ INIMONTH) + initialisation des tables BAS", people:['PIERRE','CEDRIC']},
      {id:'s2', text:'Annuler automatiquement les provisions M-1 BAS Jal 36 et lettrage des comptes de tiers des provisions', people:['PIERRE','CEDRIC']},
      {id:'s3', text:'Ecritures du Journal 39', people:['PIERRE','CEDRIC']},
      {id:'s4', text:'Faire les écritures jals 31/39 des factures reçues sur le mois pour les renewal leases 62260000/62262000/63512000', people:['CEDRIC']},
    ]
  },
  {
    id:'bank', label:'Bank', color:'#38bdf8',
    tasks:[
      {id:'b2', text:'Edition / validation Rapprochements Bancaires (year end : écritures datées de Mai à transférer sur le HO)', people:['EQUIPE SOUMAYA']},
      {id:'b3', text:'Vérifier solde du 41300001 + saisie des discounts charges', people:['LIAM','CEDRIC']},
      {id:'b4', text:'Saisie des intérêts HSBC liés au prêt HSBC Guernsey + intérêts RBS loan rollover sur HSBC 919', people:['LOURDES','CEDRIC']},
    ]
  },
  {
    id:'salary', label:'Salaires', color:'#a78bfa',
    tasks:[
      {id:'sal1', text:'Provision AXA', people:['PIERRE','CEDRIC']},
      {id:'sal2', text:'NIC on benefit in kind (Car & insurance)', people:['PIERRE','CEDRIC']},
      {id:'sal3', text:'Amnack recharge for payroll services Nov19 onwards — 333.33', people:['LIAM']},
      {id:'sal4', text:'TIMESHEET envoyé par Lewis Holden pour répartition salaire (Busitrade, Zahn, YESSS France)', people:['CEDRIC']},
      {id:'sal5', text:'Vérif des effectifs', people:['PIERRE','CEDRIC']},
    ]
  },
  {
    id:'sales', label:'Sales', color:'#fb923c',
    tasks:[
      {id:'b1', text:'Provisional sales (3rd working day) — envoyer Octopus & Vivo Sales à Johnathan dès la fin de saisie des ventes', people:['PIERRE','CEDRIC']},
      {id:'sa1', text:'Sales & balance re-allocation OCTOPUS (800/4100888) & VIVO USVF + réaffectation des balances des mois précédents', people:['PIERRE','CEDRIC']},
      {id:'sa2', text:"Net GP Variation from YS — OCTOPUS GP : utiliser l'import table avec le tableau de Dan Haines", people:['PIERRE']},
      {id:'sa3', text:'Refacturation des ventes du National Account — à partir du 5ème WORKING DAYS (+ entité 810 à checker)', people:['EQUIPE KATR ENNADA']},
      {id:'sa4', text:"Transfert de la balance du National Account sur les agences — à partir du 5ème WORKING DAYS (year end : écriture sur HO pour 4180000 & 41801000) + entité 810", people:['PIERRE','CEDRIC']},
      {id:'sa5', text:"NAT ACCOUNTS Cash Sales adjustment (AE's files)", people:['PIERRE','CEDRIC']},

const MONTHS_FR = ['Janvier','Février','Mars','Avril','Mai','Juin','Juillet','Août','Septembre','Octobre','Novembre','Décembre'];
function initMonthSelect() {
  const sel = document.getElementById('monthSelect');
  const now = new Date();
  for (let offset = -3; offset <= 1; offset++) {
    const d = new Date(now.getFullYear(), now.getMonth() + offset, 1);
    const opt = document.createElement('option');
    opt.value = d.getFullYear() + '-' + d.getMonth();
    opt.textContent = MONTHS_FR[d.getMonth()] + ' ' + d.getFullYear();
    if (offset === -1) opt.selected = true;
    sel.appendChild(opt);
  }
  if (state.selectedMonth) sel.value = state.selectedMonth;
}
function changeMonth() {
  state.selectedMonth = document.getElementById('monthSelect').value;
  saveLocalState();
}

function getSections() {
  return (state.sections && state.sections.length > 0) ? state.sections : DEFAULT_SECTIONS;
}
function render() {
  const container = document.getElementById('mainContent');
  container.innerHTML = '';
  (getSections()).forEach(section => {
    container.appendChild(buildSection(section));
  });
  updateGlobal();
  applyPersonFilter();
  applySearch();
}

function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return `rgba(${r},${g},${b},${alpha})`;
}

function buildSection(section) {
  const total     = section.tasks.length;
  const doneCount = section.tasks.filter(t => state.done[t.id]).length;
  const pct       = total > 0 ? Math.round(doneCount / total * 100) : 0;

  const div = document.createElement('div');
  div.className = 'section' + (state.collapsed[section.id] ? ' collapsed' : '');
  div.id = 'section-' + section.id;
  div.style.background   = hexToRgba(section.color, 0.18);
  div.style.borderColor  = hexToRgba(section.color, 0.2);

  // En-tête
  const header = document.createElement('div');
  header.className = 'section-header';
  header.innerHTML = `
    <div class="section-dot" style="background:${section.color}"></div>
    <div class="section-title" style="color:${section.color}">${section.label}</div>
    ${pct === 100 ? '<div class="section-done-badge">✓ DONE</div>' : ''}
    <div class="section-bar-wrap"><div class="section-bar-fill" style="width:${pct}%;background:${section.color}"></div></div>
    <div class="section-pct" style="color:${section.color}">${pct}%</div>
    <div class="section-count">${doneCount}/${total}</div>
    <div class="section-chevron">▾</div>
  `;
  header.addEventListener('click', () => toggleSection(section.id));
  div.appendChild(header);

  // Corps
  const body = document.createElement('div');
  body.className = 'section-body';
  body.id = 'body-' + section.id;
  section.tasks.forEach(task => body.appendChild(buildTask(task, section.color)));

  // ── Ligne "Ajouter une tâche" ──
  const addRow = document.createElement('div');
  addRow.className = 'add-task-row';
  addRow.id = 'addrow-' + section.id;
  const addBtn = document.createElement('button');
  addBtn.className = 'add-task-btn';
  addBtn.innerHTML = '＋ Ajouter une tâche';
  addBtn.onclick = (e) => { e.stopPropagation(); openAddForm(section.id); };
  addRow.appendChild(addBtn);
  body.appendChild(addRow);

  // ── Formulaire d'ajout (caché par défaut) ──
  const form = buildAddForm(section.id);
  body.appendChild(form);

  div.appendChild(body);
  return div;
}

function buildTask(task, color) {
  const isDone = !!state.done[task.id];
  const div = document.createElement('div');
  div.className = 'task-item' + (isDone ? ' done' : '');
  div.id = 'task-' + task.id;
  div.setAttribute('data-people', task.people.join(',').toUpperCase());

  const peopleHTML = task.people.map(p =>
    `<span class="person-tag" data-person="${p.toUpperCase()}">${p}</span>`
  ).join('');

  div.innerHTML = `
    <div class="checkbox"></div>
    <div class="task-text">${task.text}</div>
    <div class="task-people">${peopleHTML}</div>
    <button class="task-edit" title="Modifier cette tâche">✎</button>
    <button class="task-delete" title="Supprimer cette tâche">✕</button>
  `;

  // Coche — clic sur checkbox uniquement
  div.querySelector('.checkbox').addEventListener('click', (e) => { e.stopPropagation(); toggleTask(task.id); });

  // Édition — clic sur texte ou bouton ✎
  div.querySelector('.task-text').addEventListener('click', (e) => { e.stopPropagation(); openEditForm(task.id); });
  div.querySelector('.task-edit').addEventListener('click', (e) => { e.stopPropagation(); openEditForm(task.id); });

  // Clic direct sur un badge personne → toggle rapide
  div.querySelectorAll('.person-tag').forEach(tag => {
    tag.addEventListener('click', (e) => {
      e.stopPropagation();
      quickTogglePerson(task.id, tag.getAttribute('data-person'));
    });
  });

  // Suppression
  div.querySelector('.task-delete').addEventListener('click', (e) => {
    e.stopPropagation();
    deleteTask(task.id);
  });

  return div;
}

// ── Ouvrir le formulaire d'édition inline sous la tâche ──
function openEditForm(taskId) {
  // Fermer tout autre formulaire d'édition ouvert
  document.querySelectorAll('.task-edit-form').forEach(f => f.remove());

  const sections = getSections();
  let task = null, sectionColor = '#38bdf8';
  sections.forEach(s => {
    const found = s.tasks.find(t => t.id === taskId);
    if (found) { task = found; sectionColor = s.color; }
  });
  if (!task) return;

  const taskEl = document.getElementById('task-' + taskId);
  if (!taskEl) return;

  const form = document.createElement('div');
  form.className = 'task-edit-form';
  form.id = 'editform-' + taskId;

  const peopleChips = ALL_PEOPLE.map(p => {
    const isSelected = task.people.map(x => x.toUpperCase()).includes(p.toUpperCase());
    return `<span class="people-chip${isSelected ? ' selected' : ''}" data-person="${p}"
      onclick="this.classList.toggle('selected')">${p.charAt(0)+p.slice(1).toLowerCase()}</span>`;
  }).join('');

  form.innerHTML = `
    <input id="editinput-${taskId}" value="${task.text.replace(/"/g, '&quot;')}" />
    <div class="task-edit-people">
      <label>Personnes :</label>
      ${peopleChips}
    </div>
    <div class="add-task-actions">
      <button class="btn-save" onclick="saveEditTask('${taskId}')">Enregistrer</button>
      <button class="btn-cancel" onclick="closeEditForm('${taskId}')">Annuler</button>
    </div>
  `;

  // Insérer après la tâche
  taskEl.insertAdjacentElement('afterend', form);

  // Focus + Entrée pour valider
  const inp = form.querySelector('input');
  if (inp) {
    inp.focus();
    inp.setSelectionRange(inp.value.length, inp.value.length);
    inp.addEventListener('keydown', e => {
      if (e.key === 'Enter') saveEditTask(taskId);
      if (e.key === 'Escape') closeEditForm(taskId);
    });
  }
}

function closeEditForm(taskId) {
  const form = document.getElementById('editform-' + taskId);
  if (form) form.remove();
}


// ── Toggle rapide d'une personne en cliquant sur son badge ──
function quickTogglePerson(taskId, person) {
  const sections = getSections();
  let task = null;
  sections.forEach(s => { const t = s.tasks.find(t => t.id === taskId); if (t) task = t; });
  if (!task) return;

  const p = person.toUpperCase();
  const idx = task.people.findIndex(x => x.toUpperCase() === p);

  if (idx !== -1) {
    // Enlever — mais pas si c'est la dernière personne
    if (task.people.length === 1) {
      // Feedback visuel : flash rouge
      const tag = document.querySelector(`#task-${taskId} .person-tag[data-person="${p}"]`);
      if (tag) { tag.classList.add('removed'); setTimeout(() => tag.classList.remove('removed'), 600); }
      return;
    }
    task.people.splice(idx, 1);
  } else {
    // Ajouter
    task.people.push(p);
  }

  state.sections = sections;

  // Mettre à jour le DOM de la tâche
  const taskEl = document.getElementById('task-' + taskId);
  if (taskEl) {
    const peopleDiv = taskEl.querySelector('.task-people');
    peopleDiv.innerHTML = task.people.map(p =>
      `<span class="person-tag" data-person="${p.toUpperCase()}">${p.charAt(0)+p.slice(1).toLowerCase()}</span>`
    ).join('');
    taskEl.setAttribute('data-people', task.people.join(',').toUpperCase());
    // Réattacher les listeners sur les nouveaux tags
    taskEl.querySelectorAll('.person-tag').forEach(tag => {
      tag.addEventListener('click', (e) => {
        e.stopPropagation();
        quickTogglePerson(taskId, tag.getAttribute('data-person'));
      });
    });
  }

  saveLocalState();
  pushToJsonbin();
  applyPersonFilter();
}

function saveEditTask(taskId) {
  const inp = document.getElementById('editinput-' + taskId);
  const newText = inp ? inp.value.trim() : '';
  if (!newText) return;

  const form = document.getElementById('editform-' + taskId);
  const selected = [...form.querySelectorAll('.people-chip.selected')].map(c => c.getAttribute('data-person').toUpperCase());
  const newPeople = selected.length > 0 ? selected : ['PIERRE'];

  // Mettre à jour dans state
  const sections = getSections();
  sections.forEach(s => {
    const t = s.tasks.find(t => t.id === taskId);
    if (t) { t.text = newText; t.people = newPeople; }
  });
  state.sections = sections;

  closeEditForm(taskId);
  saveLocalState();
  pushToJsonbin();

  // Mettre à jour le DOM de la tâche sans re-render complet
  const taskEl = document.getElementById('task-' + taskId);
  if (taskEl) {
    taskEl.querySelector('.task-text').textContent = newText;
    const peopleDiv = taskEl.querySelector('.task-people');
    peopleDiv.innerHTML = newPeople.map(p =>
      `<span class="person-tag" data-person="${p.toUpperCase()}">${p}</span>`
    ).join('');
    taskEl.setAttribute('data-people', newPeople.join(',').toUpperCase());
  }
  applyPersonFilter();
}

// ── Formulaire d'ajout inline ──
function buildAddForm(sectionId) {
  const form = document.createElement('div');
  form.className = 'add-task-form';
  form.id = 'addform-' + sectionId;

  // Chips personnes
  const peopleChips = ALL_PEOPLE.map(p =>
    `<span class="people-chip" data-person="${p}" onclick="togglePeopleChip(this,'${sectionId}')">${p.charAt(0)+p.slice(1).toLowerCase()}</span>`
  ).join('');

  form.innerHTML = `
    <input class="add-task-input" id="addinput-${sectionId}" placeholder="Description de la tâche…" />
    <div class="add-task-people">
      <label>Personnes :</label>
      ${peopleChips}
    </div>
    <div class="add-task-actions">
      <button class="btn-save" onclick="saveNewTask('${sectionId}')">Ajouter</button>
      <button class="btn-cancel" onclick="closeAddForm('${sectionId}')">Annuler</button>
    </div>
  `;

  // Valider avec Entrée
  setTimeout(() => {
    const inp = form.querySelector(`#addinput-${sectionId}`);
    if (inp) inp.addEventListener('keydown', e => { if (e.key === 'Enter') saveNewTask(sectionId); });
  }, 0);

  return form;
}

function togglePeopleChip(el, sectionId) {
  el.classList.toggle('selected');
}

function openAddForm(sectionId) {
  const form = document.getElementById('addform-' + sectionId);
  if (!form) return;
  form.classList.add('open');
  // Réinitialiser
  const inp = document.getElementById('addinput-' + sectionId);
  if (inp) { inp.value = ''; inp.focus(); }
  form.querySelectorAll('.people-chip').forEach(c => c.classList.remove('selected'));
}

function closeAddForm(sectionId) {
  const form = document.getElementById('addform-' + sectionId);
  if (form) form.classList.remove('open');
}

function saveNewTask(sectionId) {
  const inp = document.getElementById('addinput-' + sectionId);
  const text = (inp ? inp.value.trim() : '');
  if (!text) { inp && inp.focus(); return; }

  // Personnes sélectionnées
  const form = document.getElementById('addform-' + sectionId);
  const selected = [...form.querySelectorAll('.people-chip.selected')].map(c => c.getAttribute('data-person').toUpperCase());
  const people = selected.length > 0 ? selected : ['PIERRE']; // défaut : Pierre

  const newTask = { id: genId(), text, people };

  // Ajouter à la section dans state
  const sections = getSections();
  const section  = sections.find(s => s.id === sectionId);
  if (!section) return;
  section.tasks.push(newTask);
  state.sections = sections;

  closeAddForm(sectionId);
  saveLocalState();
  pushToJsonbin(); // Sync immédiat

  // Ajout DOM sans re-render complet
  const body    = document.getElementById('body-' + sectionId);
  const addRow  = document.getElementById('addrow-' + sectionId);
  const taskEl  = buildTask(newTask, section.color);
  body.insertBefore(taskEl, addRow);
  refreshSectionHeader(section);
  updateGlobal();
  applyPersonFilter();
}

function deleteTask(taskId) {
  const sections = getSections();
  let taskText = '';
  sections.forEach(s => { const t = s.tasks.find(t => t.id === taskId); if (t) taskText = t.text; });
  if (!confirm(`Supprimer cette tâche ?\n\n"${taskText.slice(0,80)}${taskText.length>80?'…':''}"`)) return;

  let sectionRef = null;
  sections.forEach(s => {
    const idx = s.tasks.findIndex(t => t.id === taskId);
    if (idx !== -1) { s.tasks.splice(idx, 1); sectionRef = s; }
  });
  state.sections = sections;

  // Suppression DOM
  const el = document.getElementById('task-' + taskId);
  if (el) el.remove();

  if (sectionRef) refreshSectionHeader(sectionRef);
  updateGlobal();
  saveLocalState();
  pushToJsonbin(); // Sync immédiat
}

// ══════════════════════════════════════════════════════
// TOGGLE TÂCHE (cocher / décocher)
// ══════════════════════════════════════════════════════
function toggleTask(taskId) {
  if (state.done[taskId]) delete state.done[taskId];
  else { state.done[taskId] = true; checkSectionComplete(taskId); }

  const el = document.getElementById('task-' + taskId);
  if (el) el.classList.toggle('done', !!state.done[taskId]);

  const sections = getSections();
  const section  = sections.find(s => s.tasks.some(t => t.id === taskId));
  if (section) refreshSectionHeader(section);

  updateGlobal();
  saveLocalState();
  pushToJsonbin();
}

function refreshSectionHeader(section) {
  const sEl = document.getElementById('section-' + section.id);
  if (!sEl) return;
  const total     = section.tasks.length;
  const doneCount = section.tasks.filter(t => state.done[t.id]).length;
  const pct       = total > 0 ? Math.round(doneCount / total * 100) : 0;
  const header    = sEl.querySelector('.section-header');
  const fill      = header.querySelector('.section-bar-fill');
  const pctEl     = header.querySelector('.section-pct');
  const countEl   = header.querySelector('.section-count');
  const badgeEl   = header.querySelector('.section-done-badge');
  if (fill)   fill.style.width    = pct + '%';
  if (pctEl)  pctEl.textContent   = pct + '%';
  if (countEl)countEl.textContent = doneCount + '/' + total;
  if (pct === 100 && !badgeEl) {
    const badge = document.createElement('div');
    badge.className = 'section-done-badge';
    badge.textContent = '✓ DONE';
    header.querySelector('.section-title').after(badge);
  } else if (pct < 100 && badgeEl) {
    badgeEl.remove();
  }
}

function checkSectionComplete(taskId) {
  const sections = getSections();
  const section  = sections.find(s => s.tasks.some(t => t.id === taskId));
  if (!section) return;
  const doneCount = section.tasks.filter(t => state.done[t.id]).length;
  if (doneCount === section.tasks.length) launchConfetti(30, section.color);
}

function updateGlobal() {
  const sections   = getSections();
  const totalTasks = sections.reduce((a,s) => a + s.tasks.length, 0);
  const doneTasks  = sections.reduce((a,s) => a + s.tasks.filter(t => state.done[t.id]).length, 0);
  const pct        = totalTasks > 0 ? Math.round(doneTasks / totalTasks * 100) : 0;
  document.getElementById('globalBarFill').style.width = pct + '%';
  document.getElementById('globalPct').textContent = pct + '%';
  if (pct === 100) setTimeout(() => launchConfetti(100, null), 100);
}

function toggleSection(sectionId) {
  if (state.collapsed[sectionId]) delete state.collapsed[sectionId];
  else state.collapsed[sectionId] = true;
  const el = document.getElementById('section-' + sectionId);
  if (el) el.classList.toggle('collapsed', !!state.collapsed[sectionId]);
  saveLocalState();
}

// ══════════════════════════════════════════════════════
// FILTRES
// ══════════════════════════════════════════════════════
let currentPerson = 'ALL';
let showDone      = true;
let searchQuery   = '';

function filterPerson(chipEl) {
  document.querySelectorAll('.chip[data-person]').forEach(c => c.classList.remove('active'));
  chipEl.classList.add('active');
  currentPerson = chipEl.getAttribute('data-person');

  if (currentPerson === 'ALL') {
    // Vue normale
    document.getElementById('mainContent').classList.remove('hidden');
    document.getElementById('personView').classList.remove('active');
    applyPersonFilter();
  } else {
    // Vue par personne
    document.getElementById('mainContent').classList.add('hidden');
    renderPersonView(currentPerson);
    document.getElementById('personView').classList.add('active');
  }
}

// ── Vue par personne ──
function renderPersonView(person) {
  const pv = document.getElementById('personView');
  const sections = getSections();
  const color = personColor(person);

  // Collecter toutes les tâches (assignées ou non)
  let totalAssigned = 0, totalDone = 0;
  const bySection = sections.map(s => {
    const tasks = s.tasks; // toutes les tâches de la section
    const assigned = tasks.filter(t => isPersonInTask(person, t));
    totalAssigned += assigned.length;
    totalDone += assigned.filter(t => state.done[t.id]).length;
    return { section: s, tasks };
  }).filter(x => x.tasks.length > 0);

  const pct = totalAssigned > 0 ? Math.round(totalDone / totalAssigned * 100) : 0;
  const label = person.charAt(0) + person.slice(1).toLowerCase();

  let html = `
    <div class="pv-header">
      <div class="pv-avatar" style="background:${color}">${person.charAt(0)}</div>
      <div>
        <div class="pv-name">${label}</div>
        <div class="pv-stats">${totalAssigned} tâches assignées · ${totalDone} faites · ${pct}%</div>
      </div>
      <div class="pv-progress" style="max-width:220px">
        <div class="pv-bar-bg"><div class="pv-bar-fill" style="width:${pct}%;background:${color}"></div></div>
      </div>
    </div>
  `;

  bySection.forEach(({ section, tasks }) => {
    // Trier : assignées en premier, puis non assignées
    const assigned = tasks.filter(t => isPersonInTask(person, t));
    const notAssigned = tasks.filter(t => !isPersonInTask(person, t));
    const all = [...assigned, ...notAssigned];

    html += `
      <div class="pv-section-title">
        <div class="pv-section-dot" style="background:${section.color}"></div>
        ${section.label}
        <span style="font-size:10px;color:${section.color};font-weight:600">${assigned.length}/${tasks.length}</span>
      </div>
    `;

    all.forEach(task => {
      const isAssigned = isPersonInTask(person, task);
      const isDone = !!state.done[task.id];
      html += `
        <div class="pv-task${isAssigned ? ' assigned' : ''}" id="pvtask-${task.id}" onclick="pvToggleAssign('${task.id}','${person}')">
          <div class="pv-checkbox"></div>
          <div class="pv-task-text">${task.text}</div>
          ${isDone && isAssigned ? '<div class="pv-done-badge">✓ fait</div>' : ''}
        </div>
      `;
    });
  });

  pv.innerHTML = html;
}

function isPersonInTask(person, task) {
  return task.people.some(p => p.toUpperCase() === person.toUpperCase() || 
    (person === 'EQUIPE' && p.toUpperCase().startsWith('EQUIPE')));
}

function personColor(person) {
  const colors = {
    PIERRE:'#38bdf8', CEDRIC:'#a78bfa', LIAM:'#34d399',
    LOURDES:'#fb923c', MAHER:'#4ade80', ABDUL:'#f472b6', EQUIPE:'#fbbf24'
  };
  return colors[person] || '#38bdf8';
}

function pvToggleAssign(taskId, person) {
  const sections = getSections();
  let task = null;
  sections.forEach(s => { const t = s.tasks.find(t => t.id === taskId); if (t) task = t; });
  if (!task) return;

  const p = person.toUpperCase();
  const idx = task.people.findIndex(x => x.toUpperCase() === p);

  if (idx !== -1) {
    if (task.people.length === 1) return; // Ne pas laisser vide
    task.people.splice(idx, 1);
  } else {
    task.people.push(p);
  }

  state.sections = sections;
  saveLocalState();
  pushToJsonbin();

  // Re-render la vue personne
  renderPersonView(person);
}

function applyPersonFilter() {
  document.querySelectorAll('.task-item').forEach(el => {
    const people = (el.getAttribute('data-people') || '').toUpperCase();
    let visible = true;
    if (currentPerson !== 'ALL') {
      visible = currentPerson === 'EQUIPE'
        ? people.includes('EQUIPE')
        : people.split(',').includes(currentPerson);
    }
    if (!showDone && el.classList.contains('done')) visible = false;
    if (searchQuery && !el.querySelector('.task-text').textContent.toLowerCase().includes(searchQuery)) visible = false;
    el.classList.toggle('filtered-out', !visible);
    el.querySelectorAll('.person-tag').forEach(tag => {
      const tp = (tag.getAttribute('data-person') || '').toUpperCase();
      tag.classList.toggle('highlight',
        currentPerson !== 'ALL' && (currentPerson === 'EQUIPE' ? tp.includes('EQUIPE') : tp === currentPerson)
      );
    });
  });
  (getSections()).forEach(s => {
    const sEl  = document.getElementById('section-' + s.id);
    const body = document.getElementById('body-' + s.id);
    if (!sEl || !body) return;
    const visibleTasks = [...body.querySelectorAll('.task-item')].filter(t => !t.classList.contains('filtered-out'));
    sEl.classList.toggle('hidden', visibleTasks.length === 0);
  });
}

function applySearch() {
  searchQuery = document.getElementById('searchInput').value.toLowerCase().trim();
  applyPersonFilter();
}

function toggleShowDone() {
  showDone = !showDone;
  const chip = document.getElementById('showDoneChip');
  chip.classList.toggle('active', !showDone);
  chip.textContent = showDone ? '☑ Masquer faites' : '☑ Afficher faites';
  applyPersonFilter();
}

// ══════════════════════════════════════════════════════
// RESET
// ══════════════════════════════════════════════════════
function resetMonth() {
  if (!confirm('Réinitialiser toutes les coches pour le nouveau mois ?\n\nAttention : cette action sera synchronisée pour tous les utilisateurs.\n(Les tâches ne sont pas supprimées.)')) return;
  state.done      = {};
  state.collapsed = {};
  saveLocalState();
  render();
  pushToJsonbin();
}

// ══════════════════════════════════════════════════════
// CONFETTI
// ══════════════════════════════════════════════════════
function launchConfetti(count, baseColor) {
  const container = document.getElementById('confettiWrap');
  const colors = baseColor
    ? [baseColor, '#fff', baseColor + 'aa']
    : ['#38bdf8','#34d399','#a78bfa','#fb923c','#fbbf24','#f472b6','#f87171','#22d3ee'];
  for (let i = 0; i < count; i++) {
    const piece = document.createElement('div');
    piece.className = 'confetti-piece';
    piece.style.left = Math.random() * 100 + 'vw';
    piece.style.top  = '-10px';
    piece.style.background = colors[Math.floor(Math.random() * colors.length)];
    piece.style.animationDuration = (1.2 + Math.random() * 1.2) + 's';
    piece.style.animationDelay    = Math.random() * .5 + 's';
    piece.style.width = piece.style.height = (5 + Math.random() * 8) + 'px';
    if (Math.random() > .5) piece.style.borderRadius = '50%';
    container.appendChild(piece);
    setTimeout(() => piece.remove(), 3000);
  }
}

// ══════════════════════════════════════════════════════
// JSONBIN — PUSH (done + sections)
// ══════════════════════════════════════════════════════
let lastPushTime = 0;
const PUSH_LOCK_MS = 15000;

async function pushToJsonbin() {
  lastPushTime = Date.now();
  setSyncStatus('spin', 'Sync en cours…');
  try {
    const payload = {
      done:     state.done,
      sections: getSections(),
      ts:       Date.now()
    };
    const res = await fetch(JSONBIN_URL, {
      method:  'PUT',
      headers: { 'Content-Type':'application/json', 'X-Master-Key': JSONBIN_KEY },
      body:    JSON.stringify(payload)
    });
    if (res.ok) setSyncStatus('ok', 'Sync OK — ' + new Date().toLocaleTimeString('fr-FR'));
    else        setSyncStatus('err', 'Erreur push ' + res.status);
  } catch(e) {
    setSyncStatus('err', 'Hors ligne');
  }
}

// ══════════════════════════════════════════════════════
// JSONBIN — PULL (done + sections)
// ══════════════════════════════════════════════════════
async function pullFromJsonbin() {
  if (Date.now() - lastPushTime < PUSH_LOCK_MS) return;
  try {
    const res = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    let changed = false;

    // Mise à jour des coches
    if (data.done !== undefined) {
      const rStr = JSON.stringify(data.done);
      const lStr = JSON.stringify(state.done);
      if (rStr !== lStr) { state.done = data.done; changed = true; }
    }

    // Mise à jour des tâches (structure) — ignorer si vide
    if (data.sections && data.sections.length > 0) {
      const rStr = JSON.stringify(data.sections);
      const lStr = JSON.stringify(getSections());
      if (rStr !== lStr) { state.sections = data.sections; changed = true; }
    }

    if (changed) { saveLocalState(); render(); }
    setSyncStatus('ok', 'Sync OK — ' + new Date().toLocaleTimeString('fr-FR'));
  } catch(e) {
    setSyncStatus('err', 'Erreur pull: ' + e.message);
  }
}

async function syncNow() {
  await pushToJsonbin();
  lastPushTime = 0; // Forcer le pull
  await pullFromJsonbin();
}

function setSyncStatus(status, msg) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncStatus');
  dot.className = 'sync-dot ' + status;
  txt.textContent = msg;
}

let syncInterval = null;
function startSync() {
  if (syncInterval) clearInterval(syncInterval);
  syncInterval = setInterval(pullFromJsonbin, 20000); // Pull toutes les 20s
}

// ══════════════════════════════════════════════════════
// INIT
// ══════════════════════════════════════════════════════
// ══════════════════════════════════════════════════════
// INIT — affichage immédiat, sync en arrière-plan
// ══════════════════════════════════════════════════════
loadLocalState();
initMonthSelect();
setSyncStatus('spin', 'Chargement…');

// 1. Afficher immédiatement avec les données locales / défauts
if (!state.sections || state.sections.length === 0) {
  state.sections = DEFAULT_SECTIONS;
}
render();

// 2. Sync JSONbin en arrière-plan
(async () => {
  try {
    const res = await fetch(JSONBIN_URL + '/latest', {
      headers: { 'X-Master-Key': JSONBIN_KEY, 'X-Bin-Meta': 'false' }
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    let changed = false;

    // Coches
    if (data.done && JSON.stringify(data.done) !== JSON.stringify(state.done)) {
      state.done = data.done;
      changed = true;
    }

    // Sections (ignorer si vide — JSONbin ancienne version)
    if (data.sections && data.sections.length > 0) {
      if (JSON.stringify(data.sections) !== JSON.stringify(state.sections)) {
        state.sections = data.sections;
        changed = true;
      }
    } else {
      // JSONbin n'a pas de sections → on y pousse les défauts
      await pushToJsonbin();
    }

    if (changed) { saveLocalState(); render(); }
    setSyncStatus('ok', 'Sync OK — ' + new Date().toLocaleTimeString('fr-FR'));

  } catch(e) {
    setSyncStatus('err', 'Hors ligne — données locales affichées');
  }

  startSync();
})();
</script>
